  - "Gemini"
  - "Cursor"

ai_usage_summary: |
  Used Gemini for architecture planning, designing honeypot detection rules, and structuring the candidate ranking logic.
  No candidate data was uploaded or transmitted to external LLM APIs during ranking.

methodology_summary: |
  A lightweight, high-performance rule-based heuristic ranker that processes 100k candidates under 20 seconds.
  First filters synthetic honeypot traps using strict checks (duplicate descriptions, impossible skill durations, invalid salary bounds).
  Remaining candidates are evaluated using an experience fit metric (5-9 years target), targeted AI/ML/IR skill relevance, past product engineering experience (excluding consultancy firms), location matching, and multi-factor behavioral engagement signals.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
